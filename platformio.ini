; PlatformIO Project Configuration File
;
; fishio.2 — ESP32 aquarium monitor/controller
; See HARDWARE.md for the full pin allocation.
;
; Environments:
;   esp32dev — the main firmware (default)
;   diag     — standalone GC9A01 display diagnostic (src/diag_display.cpp)
;              pio run -e diag -t upload && pio device monitor -e diag

[platformio]
default_envs = esp32dev

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
	knolleary/PubSubClient@^2.8
	moononournation/GFX Library for Arduino@1.3.7

[env:esp32dev]
build_src_filter = +<*> -<diag_display.cpp>

[env:diag]
build_src_filter = -<*> +<diag_display.cpp>
build_flags = -DDIAG_SPI_SPEED=8000000
